<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Istiak Rahman — developer. Find me on GitHub, Telegram, Instagram, X and Discord.">
<title>Istiak Rahman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --white:#ffffff;
    --lavender:#BBAACC;
    --offwhite:#EEEEEE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--black);
    color:var(--white);
    font-family:'Rajdhani', sans-serif;
    overflow-x:hidden;
  }

  /* lavender topbar - fixed brand strip */
  .topbar{
    position:fixed;
    top:0; left:0; right:0;
    height:8px;
    background:var(--lavender);
    z-index:50;
    box-shadow:0 0 20px rgba(187,170,204,0.6);
  }

  /* animated background stand-in for video */
  .bg{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(187,170,204,0.10), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(187,170,204,0.08), transparent 45%),
      radial-gradient(circle at 50% 80%, rgba(187,170,204,0.10), transparent 50%),
      #000000;
    overflow:hidden;
  }
  .bg::before{
    content:'';
    position:absolute;
    inset:-50%;
    background-image:
      radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 80% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 60%, rgba(187,170,204,0.7), transparent),
      radial-gradient(2px 2px at 30% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 90% 70%, rgba(187,170,204,0.6), transparent),
      radial-gradient(2px 2px at 45% 40%, rgba(255,255,255,0.3), transparent);
    animation: drift 30s linear infinite;
    opacity:0.8;
  }
  @keyframes drift{
    0%{ transform: translate(0,0); }
    100%{ transform: translate(-4%, -6%); }
  }

  .bg video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.5;
  }
  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 30%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.75) 100%);
  }
    position:relative;
    z-index:5;
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    color:var(--offwhite);
    padding-top:16px;
    text-transform:uppercase;
    opacity:0.6;
  }

  main{
    position:relative;
    z-index:5;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
    max-width:640px;
    margin:0 auto;
  }

  .avatar-wrap{
    position:relative;
    width:180px;
    height:180px;
    margin-bottom:32px;
  }
  .avatar-glow{
    position:absolute;
    inset:-30px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(187,170,204,0.55), transparent 65%);
    filter:blur(10px);
    animation: pulse 3s ease-in-out infinite;
  }
  .avatar-glow::after{
    content:'';
    position:absolute;
    inset:12px;
    border-radius:50%;
    border:2px solid rgba(187,170,204,0.7);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:0.75; }
    50%{ transform:scale(1.15); opacity:1; }
  }
  @keyframes ringPulse{
    0%{ transform:scale(0.9); opacity:0.9; }
    70%{ transform:scale(1.35); opacity:0; }
    100%{ transform:scale(1.35); opacity:0; }
  }
  .avatar{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(160deg, #1a1a1a, #000000);
    border:2px solid var(--lavender);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron', sans-serif;
    font-size:56px;
    font-weight:900;
    color:var(--lavender);
    z-index:2;
    box-shadow:0 0 40px rgba(187,170,204,0.6), 0 0 80px rgba(187,170,204,0.25);
  }

  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(32px, 8vw, 56px);
    letter-spacing:2px;
    background:linear-gradient(90deg, #ffffff 0%, #BBAACC 50%, #ffffff 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(187,170,204,0.5);
    min-height:1.2em;
    transition:opacity 1s ease;
  }
  h1 .cursor, .tagline .cursor{
    -webkit-text-fill-color:var(--lavender);
    color:var(--lavender);
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0; }
  }
  h1.glow-out{
    animation: glowOut 1.8s ease forwards;
  }
  @keyframes glowOut{
    0%{ text-shadow:0 0 30px rgba(187,170,204,0.5); opacity:1; }
    40%{ text-shadow:0 0 60px rgba(187,170,204,1), 0 0 100px rgba(187,170,204,0.7); opacity:1; }
    100%{ text-shadow:0 0 80px rgba(187,170,204,1); opacity:0; }
  }

  .tagline{
    margin-top:14px;
    font-size:clamp(16px, 3.5vw, 20px);
    font-weight:500;
    color:var(--offwhite);
    letter-spacing:0.5px;
    min-height:1.4em;
  }

  .socials{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content:center;
    margin-top:48px;
  }
  .icon-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.3);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--white);
    text-decoration:none;
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    position:relative;
    overflow:hidden;
  }
  .icon-btn:hover{
    background:rgba(187,170,204,0.18);
    border-color:var(--lavender);
    transform:translateY(-3px);
  }
  .icon-btn.clicked{
    animation: iconClick 0.5s ease;
  }
  @keyframes iconClick{
    0%{ box-shadow:0 0 0 0 rgba(187,170,204,0.9); border-color:var(--lavender); }
    60%{ box-shadow:0 0 0 18px rgba(187,170,204,0); }
    100%{ box-shadow:0 0 0 18px rgba(187,170,204,0); border-color:rgba(255,255,255,0.3); }
  }
  .icon-btn svg{ width:26px; height:26px; fill:currentColor; }

  @media (min-width:1024px){
    .avatar-wrap{ width:200px; height:200px; }
    .avatar{ font-size:60px; }
  }

  @media (max-width:640px){
    .icon-btn{ width:48px; height:48px; }
    .icon-btn svg{ width:22px; height:22px; }
    .avatar-wrap{ width:140px; height:140px; margin-bottom:24px; }
    .avatar{ font-size:44px; }
    main{ padding:16px; }
    .socials{ gap:12px; margin-top:36px; }
    .audio-btn{ bottom:16px; right:16px; width:48px; height:48px; }
    .audio-btn svg{ width:20px; height:20px; }
  }

  @media (max-width:360px){
    .icon-btn{ width:44px; height:44px; }
    .avatar-wrap{ width:120px; height:120px; }
    .avatar{ font-size:38px; }
  }

  /* audio toggle */
  .audio-btn{
    position:fixed;
    bottom:24px;
    right:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:2px solid var(--lavender);
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:20;
  }
  .audio-btn svg{ width:24px; height:24px; fill:currentColor; }
</style>
</head>
<body>

  <div class="topbar"></div>
  <div class="bg">
    <!-- Put your video file at assets/background.mp4 (same folder as this html file) -->
    <video autoplay muted loop playsinline>
      <source src="assets/background.mp4" type="video/mp4">
    </video>
  </div>
  <div class="vignette"></div>
  <!-- Put your audio file at assets/background.mp3 -->
  <audio id="bgAudio" loop>
    <source src="assets/background.mp3" type="audio/mpeg">
  </audio>


  <main>
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <div class="avatar">IR</div>
    </div>

    <h1 id="nameText"></h1>
    <p class="tagline" id="taglineText"></p>

    <div class="socials">
      <a class="icon-btn" href="https://github.com/istiakrahman15" target="_blank" aria-label="GitHub" data-name="GitHub">
        <svg viewBox="0 0 24 24"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.42 7.86 10.96.57.1.78-.25.78-.55 0-.27-.01-1-.02-1.96-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.75 2.7 1.25 3.36.96.1-.75.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.59.23 2.76.11 3.05.73.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.4-5.27 5.69.42.36.78 1.08.78 2.18 0 1.57-.01 2.84-.01 3.23 0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/></svg>
      </a>
      <a class="icon-btn" href="https://t.me/istiakrahman" target="_blank" aria-label="Telegram" data-name="Telegram">
        <svg viewBox="0 0 24 24"><path d="M23 3 1 11.5c-.6.24-.6 1.1.01 1.32l5.5 1.83 2.1 6.6c.2.6.98.75 1.4.27l3.05-3.5 5.5 4.1c.55.4 1.34.1 1.47-.57L23.98 3.9c.14-.72-.55-1.28-1.24-.9zM8.9 14.15l9.5-6.2-8 7.4-.3 3.3-1.2-4.5z"/></svg>
      </a>
      <a class="icon-btn" href="https://instagram.com/istiakrahman_15" target="_blank" aria-label="Instagram" data-name="Instagram">

      </a>

      </a>
    </div>
  </main>

  <button class="audio-btn" id="audioBtn" aria-label="Toggle audio" onclick="toggleAudio()">
    <svg id="audioIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2.03-4.24v8.48A4.98 4.98 0 0 0 16.5 12z"/></svg>
  </button>

  <script>
    let audioOn = false;
    const bgAudio = document.getElementById('bgAudio');
    function toggleAudio(){
      audioOn = !audioOn;
      const icon = document.getElementById('audioIcon');
      icon.innerHTML = audioOn
        ? '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2.03-4.24v8.48A4.98 4.98 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>'
        : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2.03-4.24v8.48A4.98 4.98 0 0 0 16.5 12z"/>';
      if(audioOn){ bgAudio.play().catch(()=>{}); } else { bgAudio.pause(); }
    }

    document.querySelectorAll('.icon-btn').forEach(btn=>{
      btn.addEventListener('click', function(e){
        this.classList.remove('clicked');
        void this.offsetWidth; // restart animation
        this.classList.add('clicked');
      });
    });

    // Intro typewriter sequence: name types in, glows, fades out; then tagline types in and stays.
    function typeInto(el, text, speed, done){
      el.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '|';
      el.appendChild(cursor);
      let i = 0;
      const timer = setInterval(()=>{
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
        if(i >= text.length){
          clearInterval(timer);
          setTimeout(()=>{ cursor.remove(); if(done) done(); }, 500);
        }
      }, speed);
    }

    window.addEventListener('load', ()=>{
      const nameEl = document.getElementById('nameText');
      const tagEl = document.getElementById('taglineText');

      typeInto(nameEl, 'ISTIAK RAHMAN', 90, ()=>{
        setTimeout(()=>{
          nameEl.classList.add('glow-out');
          typeInto(tagEl, "I don't seek power — I am power!", 45);
        }, 900);
      });
    });
  </script>

</body>
</html>

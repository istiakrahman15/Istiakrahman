<style>
  :root{
    --black:#000000;
    --white:#ffffff;
    --lavender:#BBAACC;
    --offwhite:#EEEEEE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--black);
    color:var(--white);
    font-family:'Rajdhani', sans-serif;
    overflow-x:hidden;
    cursor: none; /* Hide default cursor for custom cyber cursor */
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #050505; }
  ::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 4px; }

  /* Custom Cyber Cursor - Optimized with transform */
  .cursor-dot, .cursor-ring {
    position: fixed;
    top: 0;
    left: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate3d(-50%, -50%, 0);
    will-change: transform;
  }
  .cursor-dot {
    width: 8px;
    height: 8px;
    background: var(--lavender);
  }
  .cursor-ring {
    width: 36px;
    height: 36px;
    border: 1px solid var(--lavender);
    box-shadow: 0 0 10px rgba(187,170,204,0.5);
    transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .cursor-ring.hover {
    width: 60px;
    height: 60px;
    border-color: #ffffff;
    background: rgba(187, 170, 204, 0.1);
  }

  /* Background Video Container */
  .bg{
    position:fixed;
    inset:0;
    z-index:0;
    background: #000000;
    overflow:hidden;
  }
  .bg video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.8;
  }

  /* HUD Grid Overlay - Removed mix-blend-mode for performance */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(187, 170, 204, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(187, 170, 204, 0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    will-change: transform;
  }

  /* Cinematic Vignette */
  .vignette{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:
      radial-gradient(circle at center, transparent 0%, transparent 40%, rgba(0,0,0,0.85) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.6) 100%);
  }

  /* CRT Scanline Effect - Optimized with repeating-linear-gradient */
  .scanline-overlay {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 3px,
      rgba(0, 0, 0, 0.15) 4px
    );
    opacity: 0.4;
    animation: scanline-scroll 8s linear infinite;
  }
  @keyframes scanline-scroll {
    0% { background-position: 0 0; }
    100% { background-position: 0 100%; }
  }

  .particles{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    overflow:hidden;
    will-change: transform;
  }
  .particles span{
    position:absolute;
    border-radius:50%;
    background:var(--lavender);
    box-shadow:0 0 12px 3px rgba(187,170,204,0.7);
    animation:floatDot 6s ease-in-out infinite;
  }
  @keyframes floatDot{
    0%,100%{ transform:translateY(0) scale(1); opacity:0.55; }
    50%{ transform:translateY(-18px) scale(1.3); opacity:1; }
  }

  /* Audio Visualizer Canvas */
  #visualizer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 150px;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #visualizer.active { opacity: 1; }

  /* HUD Elements */
  .hud-top-left {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    color: var(--lavender);
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeInLeft 1.5s ease 0.5s forwards;
  }
  .hud-top-left::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--lavender);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--lavender);
    animation: blink 1.5s infinite;
  }
  @keyframes fadeInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .main-container {
    position: relative;
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px;
    opacity: 0;
    animation: fadeInScale 1.5s ease 0.8s forwards;
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  /* HUD Corners */
  .corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 2px solid var(--lavender);
    z-index: 6;
    opacity: 0.8;
    filter: drop-shadow(0 0 5px rgba(187,170,204,0.5));
  }
  .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .br { bottom: 0; right: 0; border-left: none; border-top: none; }

  main{
    position:relative;
    z-index:5;
    min-height:90vh;
    min-height:90dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 60px 20px;
  }

  .avatar-wrap{
    position:relative;
    width:180px;
    height:180px;
    margin-bottom:32px;
  }
  .avatar-glow{
    position:absolute;
    inset:-30px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(187,170,204,0.55), transparent 65%);
    filter:blur(10px);
    animation: pulse 3s ease-in-out infinite;
  }
  .avatar-glow::after{
    content:'';
    position:absolute;
    inset:12px;
    border-radius:50%;
    border:2px solid rgba(187,170,204,0.7);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:0.75; }
    50%{ transform:scale(1.15); opacity:1; }
  }
  @keyframes ringPulse{
    0%{ transform:scale(0.9); opacity:0.9; }
    70%{ transform:scale(1.35); opacity:0; }
    100%{ transform:scale(1.35); opacity:0; }
  }
  .avatar{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(10,10,10,0.9), rgba(0,0,0,0.95));
    border:2px solid var(--lavender);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron', sans-serif;
    font-size:56px;
    font-weight:900;
    color:var(--lavender);
    z-index:2;
    box-shadow:0 0 40px rgba(187,170,204,0.6), inset 0 0 20px rgba(0,0,0,0.8);
  }

  /* Online Status Dot */
  .status-dot {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 20px;
    height: 20px;
    background: #00ff9d;
    border: 3px solid var(--black);
    border-radius: 50%;
    z-index: 3;
    box-shadow: 0 0 10px #00ff9d;
    animation: statusPulse 2s infinite;
  }
  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 5px #00ff9d; }
    50% { box-shadow: 0 0 15px #00ff9d, 0 0 25px #00ff9d; }
  }

  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(32px, 8vw, 56px);
    letter-spacing:2px;
    background:linear-gradient(90deg, #ffffff 0%, #BBAACC 50%, #ffffff 100%);
    background-size: 200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 30px rgba(187,170,204,0.5);
    min-height:1.2em;
    transition:opacity 1s ease;
    position: relative;
  }
  h1.shimmer-active {
    animation: shimmerText 3s linear infinite;
  }
  @keyframes shimmerText {
    to { background-position: 200% center; }
  }
  /* Glitch Effect */
  h1.glitch {
    animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) 2 reverse, glowPulse 1.8s ease forwards;
  }
  @keyframes glitch {
    0% { transform: translate(0); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
    25% { transform: translate(-2px); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
    50% { transform: translate(0); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
    75% { transform: translate(2px); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
    100% { transform: translate(0); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
  }

  h1 .cursor, .tagline .cursor{
    -webkit-text-fill-color:var(--lavender);
    color:var(--lavender);
    animation: blink 0.8s step-end infinite;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0; }
  }
  @keyframes glowPulse{
    0%{ text-shadow:0 0 10px rgba(0,0,0,0.9), 0 0 30px rgba(187,170,204,0.5); }
    40%{ text-shadow:0 0 20px rgba(187,170,204,1), 0 0 60px rgba(187,170,204,0.7); }
    100%{ text-shadow:0 0 15px rgba(187,170,204,0.8), 0 0 30px rgba(0,0,0,0.9); }
  }

  .tagline{
    margin-top:14px;
    font-size:clamp(16px, 3.5vw, 20px);
    font-weight:600;
    color:var(--offwhite);
    letter-spacing:0.5px;
    min-height:1.4em;
    text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
  }

  .socials{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content:center;
    margin-top:48px;
    padding: 20px 24px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(187, 170, 204, 0.3);
    border-radius: 50px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .icon-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--white);
    text-decoration:none;
    transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position:relative;
    overflow:visible;
  }
  .icon-btn:hover{
    background:rgba(187,170,204,0.15);
    border-color:var(--lavender);
    transform:translateY(-5px);
    box-shadow: 0 10px 20px rgba(187,170,204,0.2);
  }
  
  /* Tooltips for socials */
  .icon-btn::after {
    content: attr(data-name);
    position: absolute;
    bottom: 115%;
    left: 50%;
    transform: translateX(-50%) translateY(5px);
    background: rgba(10, 10, 10, 0.9);
    color: var(--lavender);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    border: 1px solid var(--lavender);
    box-shadow: 0 0 10px rgba(187,170,204,0.4);
  }
  .icon-btn:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .icon-btn.clicked{
    animation: iconClick 0.5s ease;
  }
  @keyframes iconClick{
    0%{ box-shadow:0 0 0 0 rgba(187,170,204,0.9); border-color:var(--lavender); }
    60%{ box-shadow:0 0 0 18px rgba(187,170,204,0); }
    100%{ box-shadow:0 0 0 18px rgba(187,170,204,0); border-color:rgba(255,255,255,0.1); }
  }
  .icon-btn svg{ width:26px; height:26px; fill:currentColor; transition: transform 0.3s ease; }
  .icon-btn:hover svg{ transform: scale(1.1); }

  @media (min-width:1024px){
    .avatar-wrap{ width:200px; height:200px; }
    .avatar{ font-size:60px; }
  }

  @media (max-width:640px){
    .icon-btn{ width:48px; height:48px; }
    .icon-btn svg{ width:22px; height:22px; }
    .avatar-wrap{ width:140px; height:140px; margin-bottom:24px; }
    .avatar{ font-size:44px; }
    main{ padding: 40px 10px; }
    .socials{ gap:12px; margin-top:36px; padding: 14px 16px; }
    .audio-btn{ bottom:16px; right:16px; width:48px; height:48px; }
    .audio-btn svg{ width:20px; height:20px; }
    .icon-btn::after { display: none; }
    .hud-top-left { font-size: 12px; top: 16px; left: 16px; }
    .corner { width: 20px; height: 20px; }
    /* Disable custom cursor on touch devices */
    .cursor-dot, .cursor-ring { display: none; }
    html, body { cursor: auto; }
    .icon-btn, .audio-btn { cursor: pointer; }
  }

  @media (max-width:360px){
    .icon-btn{ width:44px; height:44px; }
    .avatar-wrap{ width:120px; height:120px; }
    .avatar{ font-size:38px; }
  }

  /* audio toggle */
  .audio-btn{
    position:fixed;
    bottom:24px;
    right:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:rgba(0, 0, 0, 0.6);
    border:1px solid var(--lavender);
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:20;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s ease;
    animation: promptPulse 2s infinite;
  }
  .audio-btn:hover{
    background:rgba(187,170,204,0.15);
    box-shadow: 0 0 15px rgba(187,170,204,0.4);
  }
  .audio-btn.playing{
    animation: audioPulse 2s infinite;
  }
  .audio-btn.playing:hover {
    animation: none;
  }
  @keyframes promptPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(187,170,204,0.4); border-color: var(--lavender); }
    50% { box-shadow: 0 0 25px rgba(187,170,204,0.9); border-color: #fff; }
  }
  @keyframes audioPulse{
    0%, 100% { box-shadow: 0 0 10px rgba(187,170,204,0.4); }
    50% { box-shadow: 0 0 25px rgba(187,170,204,0.9); border-color: #fff; }
  }
  .audio-btn svg{ width:24px; height:24px; fill:currentColor; }
  
  /* Equalizer bars */
  .eq-container {
    display: none;
    gap: 4px;
    align-items: flex-end;
    height: 24px;
  }
  .audio-btn.playing .eq-container { display: flex; }
  .audio-btn.playing #audioIcon { display: none; }
  
  .eq-bar {
    width: 5px;
    background: var(--lavender);
    animation: eq 0.8s infinite ease-in-out;
  }
  .eq-bar:nth-child(1) { animation-delay: 0s; }
  .eq-bar:nth-child(2) { animation-delay: 0.2s; }
  .eq-bar:nth-child(3) { animation-delay: 0.4s; }
  
  @keyframes eq {
    0%, 100% { height: 20%; }
    50% { height: 100%; }
  }
</style>
</head>

    <svg id="audioIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2.03-4.24v8.48A4.98 4.98 0 0 0 16.5 12z"/></svg>

      <div class="eq-bar"></div>

    </div>
  </button>

  <script>
    let audioOn = false;
    const bgAudio = document.getElementById('bgAudio');
    const audioBtn = document.getElementById('audioBtn');
    
    // Audio Visualizer Setup
    let audioCtx, analyser, source, dataArray, bufferLength, animationId;
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');

    function setupVisualizer() {
      canvas.width = window.innerWidth;
      canvas.height = 150;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      source = audioCtx.createMediaElementSource(bgAudio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      analyser.fftSize = 128; // Lowered for performance
      bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);
    }

    function drawVisualizer() {
      animationId = requestAnimationFrame(drawVisualizer);
      
      if(!analyser) return;
      
      analyser.getByteFrequencyData(dataArray);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const barWidth = (canvas.width / bufferLength) * 2.5;
      let x = 0;

      for(let i = 0; i < bufferLength; i++) {
        const barHeight = dataArray[i] / 255 * canvas.height;
        
        const gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
        gradient.addColorStop(0, 'rgba(187, 170, 204, 0.1)');
        gradient.addColorStop(1, 'rgba(187, 170, 204, 0.8)');
        
        ctx.fillStyle = gradient;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#BBAACC';
        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

        x += barWidth + 1;
      }
    }

    function toggleAudio(){
      audioOn = !audioOn;
      if(audioOn){ 
        if(!audioCtx) setupVisualizer();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        bgAudio.play().catch(()=>{}); 
        audioBtn.classList.add('playing');
        canvas.classList.add('active');
        drawVisualizer();
      } else { 
        bgAudio.pause(); 
        audioBtn.classList.remove('playing');
        canvas.classList.remove('active');
        if(animationId) cancelAnimationFrame(animationId); // Stop visualizer loop when paused
      }
    }

    // Resize Visualizer on window resize
    window.addEventListener('resize', () => {
      if(canvas) canvas.width = window.innerWidth;
    });

    // Icon Click Animation
    document.querySelectorAll('.icon-btn').forEach(btn=>{
      btn.addEventListener('click', function(e){
        this.classList.remove('clicked');
        void this.offsetWidth;
        this.classList.add('clicked');
      });
    });

    // Live Clock
    function updateClock() {
      const clockElement = document.getElementById('liveClock');
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      clockElement.textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Optimized Mouse Parallax & Custom Cursor via requestAnimationFrame
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorRing = document.querySelector('.cursor-ring');
    const gridOverlay = document.querySelector('.grid-overlay');
    const particles = document.querySelector('.particles');
    
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
    let parallaxX = 0, parallaxY = 0;
    let isMouseMoveScheduled = false;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      if (!isMouseMoveScheduled) {
        isMouseMoveScheduled = true;
        requestAnimationFrame(() => {
          // Update Cursor
          cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
          
          // Calculate Parallax
          parallaxX = (mouseX / window.innerWidth - 0.5) * 30;
          parallaxY = (mouseY / window.innerHeight - 0.5) * 30;
          
          particles.style.transform = `translate3d(${parallaxX}px, ${parallaxY}px, 0)`;
          gridOverlay.style.transform = `translate3d(${parallaxX * 0.5}px, ${parallaxY * 0.5}px, 0)`;
          
          isMouseMoveScheduled = false;
        });
      }
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%)`;
      requestAnimationFrame(animateRing);
    }
    animateRing();

    document.querySelectorAll('.icon-btn, .audio-btn').forEach(el => {
      el.addEventListener('mouseenter', () => cursorRing.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursorRing.classList.remove('hover'));
    });

    // Intro typewriter sequence
    function typeInto(el, text, speed, done){
      el.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '|';
      el.appendChild(cursor);
      let i = 0;
      const timer = setInterval(()=>{
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
        if(i >= text.length){
          clearInterval(timer);
          setTimeout(()=>{ cursor.remove(); if(done) done(); }, 500);
        }
      }, speed);
    }

    window.addEventListener('load', ()=>{
      const nameEl = document.getElementById('nameText');
      const tagEl = document.getElementById('taglineText');

      typeInto(nameEl, 'ISTIAK RAHMAN', 90, ()=>{
        setTimeout(()=>{
          // Add glitch effect, then shimmer
          nameEl.classList.add('glitch', 'shimmer-active');
          setTimeout(() => nameEl.classList.remove('glitch'), 600);
          
          typeInto(tagEl, "I don't seek power — I am power!", 45);
        }, 900);
      });
    });
  </script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --white:#ffffff;
    --lavender:#BBAACC;
    --offwhite:#EEEEEE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--black);
    color:var(--white);
    font-family:'Rajdhani', sans-serif;
    overflow-x:hidden;
    cursor: crosshair;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #050505; }
  ::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 4px; }

  /* animated background stand-in for video */
  .bg{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      linear-gradient(rgba(187, 170, 204, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(187, 170, 204, 0.03) 1px, transparent 1px),
      radial-gradient(circle at 20% 20%, rgba(187,170,204,0.10), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(187,170,204,0.08), transparent 45%),
      radial-gradient(circle at 50% 80%, rgba(187,170,204,0.10), transparent 50%),
      #000000;
    background-size: 50px 50px, 50px 50px, 100% 100%, 100% 100%, 100% 100%;
    overflow:hidden;
    transition: transform 0.3s ease-out;
  }
  .bg::before{
    content:'';
    position:absolute;
    inset:-50%;
    background-image:
      radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 80% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 60%, rgba(187,170,204,0.7), transparent),
      radial-gradient(2px 2px at 30% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 90% 70%, rgba(187,170,204,0.6), transparent),
      radial-gradient(2px 2px at 45% 40%, rgba(255,255,255,0.3), transparent);
    animation: drift 30s linear infinite;
    opacity:0.8;
  }
  @keyframes drift{
    0%{ transform: translate(0,0); }
    100%{ transform: translate(-4%, -6%); }
  }
  @keyframes floatDot{
    0%,100%{ transform:translateY(0) scale(1); opacity:0.55; }
    50%{ transform:translateY(-18px) scale(1.3); opacity:1; }
  }

  .bg video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.5;
  }
  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 30%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.75) 100%);
  }

  .particles{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    overflow:hidden;
    transition: transform 0.3s ease-out;
  }
  .particles span{
    position:absolute;
    border-radius:50%;
    background:var(--lavender);
    box-shadow:0 0 12px 3px rgba(187,170,204,0.7);
    animation:floatDot 6s ease-in-out infinite;
  }

  /* HUD Elements */
  .hud-top-left {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    color: var(--lavender);
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(187,170,204,0.6);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hud-top-left::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--lavender);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--lavender);
    animation: blink 1.5s infinite;
  }

  .main-container {
    position: relative;
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px;
  }

  /* HUD Corners */
  .corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 2px solid var(--lavender);
    z-index: 6;
    opacity: 0.7;
    transition: all 0.3s ease;
  }
  .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .br { bottom: 0; right: 0; border-left: none; border-top: none; }

  main{
    position:relative;
    z-index:5;
    min-height:90vh;
    min-height:90dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 60px 20px;
    background: rgba(5, 5, 5, 0.4);
    border: 1px solid rgba(187, 170, 204, 0.1);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
  }

  .avatar-wrap{
    position:relative;
    width:180px;
    height:180px;
    margin-bottom:32px;
  }
  .avatar-glow{
    position:absolute;
    inset:-30px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(187,170,204,0.55), transparent 65%);
    filter:blur(10px);
    animation: pulse 3s ease-in-out infinite;
  }
  .avatar-glow::after{
    content:'';
    position:absolute;
    inset:12px;
    border-radius:50%;
    border:2px solid rgba(187,170,204,0.7);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:0.75; }
    50%{ transform:scale(1.15); opacity:1; }
  }
  @keyframes ringPulse{
    0%{ transform:scale(0.9); opacity:0.9; }
    70%{ transform:scale(1.35); opacity:0; }
    100%{ transform:scale(1.35); opacity:0; }
  }
  .avatar{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(160deg, #1a1a1a, #000000);
    border:2px solid var(--lavender);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron', sans-serif;
    font-size:56px;
    font-weight:900;
    color:var(--lavender);
    z-index:2;
    box-shadow:0 0 40px rgba(187,170,204,0.6), 0 0 80px rgba(187,170,204,0.25);
  }

  /* Online Status Dot */
  .status-dot {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 20px;
    height: 20px;
    background: #00ff9d;
    border: 3px solid var(--black);
    border-radius: 50%;
    z-index: 3;
    box-shadow: 0 0 10px #00ff9d;
    animation: statusPulse 2s infinite;
  }
  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 5px #00ff9d; }
    50% { box-shadow: 0 0 15px #00ff9d, 0 0 25px #00ff9d; }
  }

  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(32px, 8vw, 56px);
    letter-spacing:2px;
    background:linear-gradient(90deg, #ffffff 0%, #BBAACC 50%, #ffffff 100%);
    background-size: 200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(187,170,204,0.5);
    min-height:1.2em;
    transition:opacity 1s ease;
  }
  /* Shimmer Animation for Name */
  h1.shimmer-active {
    animation: shimmerText 3s linear infinite;
  }
  @keyframes shimmerText {
    to { background-position: 200% center; }
  }

  h1 .cursor, .tagline .cursor{
    -webkit-text-fill-color:var(--lavender);
    color:var(--lavender);
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0; }
  }
  h1.glow-out{
    animation: glowPulse 1.8s ease forwards;
  }
  @keyframes glowPulse{
    0%{ text-shadow:0 0 30px rgba(187,170,204,0.5); }
    40%{ text-shadow:0 0 60px rgba(187,170,204,1), 0 0 100px rgba(187,170,204,0.7); }
    100%{ text-shadow:0 0 40px rgba(187,170,204,0.8); }
  }

  .tagline{
    margin-top:14px;
    font-size:clamp(16px, 3.5vw, 20px);
    font-weight:500;
    color:var(--offwhite);
    letter-spacing:0.5px;
    min-height:1.4em;
    text-shadow: 0 0 10px rgba(187,170,204,0.3);
  }

  .socials{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content:center;
    margin-top:48px;
    padding: 20px 24px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(187, 170, 204, 0.15);
    border-radius: 50px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .icon-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--white);
    text-decoration:none;
    transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position:relative;
    overflow:visible;
  }
  .icon-btn:hover{
    background:rgba(187,170,204,0.15);
    border-color:var(--lavender);
    transform:translateY(-5px);
    box-shadow: 0 10px 20px rgba(187,170,204,0.2);
  }
  
  /* Tooltips for socials */
  .icon-btn::after {
    content: attr(data-name);
    position: absolute;
    bottom: 115%;
    left: 50%;
    transform: translateX(-50%) translateY(5px);
    background: rgba(10, 10, 10, 0.9);
    color: var(--lavender);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    border: 1px solid var(--lavender);
    box-shadow: 0 0 10px rgba(187,170,204,0.4);
  }
  .icon-btn:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .icon-btn.clicked{
    animation: iconClick 0.5s ease;
  }
  @keyframes iconClick{
    0%{ box-shadow:0 0 0 0 rgba(187,170,204,0.9); border-color:var(--lavender); }
    60%{ box-shadow:0 0 0 18px rgba(187,170,204,0); }
    100%{ box-shadow:0 0 0 18px rgba(187,170,204,0); border-color:rgba(255,255,255,0.1); }
  }
  .icon-btn svg{ width:26px; height:26px; fill:currentColor; transition: transform 0.3s ease; }
  .icon-btn:hover svg{ transform: scale(1.1); }

  @media (min-width:1024px){
    .avatar-wrap{ width:200px; height:200px; }
    .avatar{ font-size:60px; }
  }

  @media (max-width:640px){
    .icon-btn{ width:48px; height:48px; }
    .icon-btn svg{ width:22px; height:22px; }
    .avatar-wrap{ width:140px; height:140px; margin-bottom:24px; }
    .avatar{ font-size:44px; }
    main{ padding: 40px 10px; }
    .socials{ gap:12px; margin-top:36px; padding: 14px 16px; }
    .audio-btn{ bottom:16px; right:16px; width:48px; height:48px; }
    .audio-btn svg{ width:20px; height:20px; }
    .icon-btn::after { display: none; }
    .hud-top-left { font-size: 12px; top: 16px; left: 16px; }
    .corner { width: 20px; height: 20px; }
  }

  @media (max-width:360px){
    .icon-btn{ width:44px; height:44px; }
    .avatar-wrap{ width:120px; height:120px; }
    .avatar{ font-size:38px; }
  }

  /* audio toggle */
  .audio-btn{
    position:fixed;
    bottom:24px;
    right:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--lavender);
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:20;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }
  .audio-btn:hover{
    background:rgba(187,170,204,0.15);
    box-shadow: 0 0 15px rgba(187,170,204,0.4);
  }
  .audio-btn.playing{
    animation: audioPulse 2s infinite;
  }
  @keyframes audioPulse{
    0%, 100% { box-shadow: 0 0 10px rgba(187,170,204,0.4); }
    50% { box-shadow: 0 0 25px rgba(187,170,204,0.9); border-color: #fff; }
  }
  .audio-btn svg{ width:24px; height:24px; fill:currentColor; }
  
  /* Equalizer bars */
  .eq-container {
    display: none;
    gap: 4px;
    align-items: flex-end;
    height: 24px;
  }
  .audio-btn.playing .eq-container { display: flex; }
  .audio-btn.playing #audioIcon { display: none; }
  
  .eq-bar {
    width: 5px;
    background: var(--lavender);
    animation: eq 0.8s infinite ease-in-out;
  }
  .eq-bar:nth-child(1) { animation-delay: 0s; }
  .eq-bar:nth-child(2) { animation-delay: 0.2s; }
  .eq-bar:nth-child(3) { animation-delay: 0.4s; }
  
  @keyframes eq {
    0%, 100% { height: 20%; }
    50% { height: 100%; }
  }
</style>
</head>

  <script>
    let audioOn = false;
    const bgAudio = document.getElementById('bgAudio');
    const audioBtn = document.getElementById('audioBtn');
    
    function toggleAudio(){
      audioOn = !audioOn;
      if(audioOn){ 
        bgAudio.play().catch(()=>{}); 
        audioBtn.classList.add('playing');
      } else { 
        bgAudio.pause(); 
        audioBtn.classList.remove('playing');
      }
    }

    document.querySelectorAll('.icon-btn').forEach(btn=>{
      btn.addEventListener('click', function(e){
        this.classList.remove('clicked');
        void this.offsetWidth; // restart animation
        this.classList.add('clicked');
      });
    });

    // Live Clock
    function updateClock() {
      const clockElement = document.getElementById('liveClock');
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      clockElement.textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Mouse Parallax Effect
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 30;
      const y = (e.clientY / window.innerHeight - 0.5) * 30;
      
      document.querySelector('.bg').style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
      document.querySelector('.particles').style.transform = `translate(${x}px, ${y}px)`;
    });

    // Intro typewriter sequence: name types in, glows, stays visible; then tagline types in and stays.
    function typeInto(el, text, speed, done){
      el.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '|';
      el.appendChild(cursor);
      let i = 0;
      const timer = setInterval(()=>{
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
        if(i >= text.length){
          clearInterval(timer);
          setTimeout(()=>{ cursor.remove(); if(done) done(); }, 500);
        }
      }, speed);
    }

    window.addEventListener('load', ()=>{
      const nameEl = document.getElementById('nameText');
      const tagEl = document.getElementById('taglineText');

      typeInto(nameEl, 'ISTIAK RAHMAN', 90, ()=>{
        setTimeout(()=>{
          nameEl.classList.add('glow-out', 'shimmer-active');
          typeInto(tagEl, "I don't seek power — I am power!", 45);
        }, 900);
      });
    });
  </script>

</body>
</html>
